<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Javascript Dasar</h1>

    <section>
        <h2> Output </h2>
        <button id="btn-alert">Tampilkan Alert</button>
        <button id="btn-tulis">Tulis Halaman</button>
        <p id="hasil-output"></p>
    </section>

    <section>
        <h2> Kondisi </h2>
        <input type="number" id="input-nilai" placeholder="Masukkan Nilai">
        <button id="btn-cek">Cek Nilai</button>
        <p id="hasil-kondisi"></p>
    </section>

    <section>
        <h2> Perulangan </h2>
        <button id="btn-loop">Run Looping</button>
        <p id="hasil-loop"></p>
    </section>

    <section>
        <h2>DOM & Event</h2>
        <input type="text" id="input-nama" placeholder="Masukkan Nama">
        <button id="btn-sapa">Woyy Wokk</button>
        <p  id="hasil-dom"></p>
    </section>

    <script src="index.js"></script>
</body>
</html>
